name: Daily ETF Scraper

on:
  schedule:
  # 台灣時間 18:22 (即 UTC 10:00)
    - cron: '22 10 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      # 修改 1: 使用 --all 參數
      - name: Run daily update (All ETFs)
        run: |
          python main.py --all
      
      - name: Show database statistics
        run: |
          python main.py --stats
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/etf_holdings.db
          git add reports/
          git add docs/    # 修改 2: 添加 docs/ 目錄
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update ETF holdings data - $(date +'%Y-%m-%d')" && git push)




